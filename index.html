    <!-- Web App Manifest for PWA Installation -->
    <script>
        (function() {
            const iconSvg = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='6' fill='%233b82f6'/%3E%3Cpath d='M5 13.5V5a2 2 0 0 1 2-2h7.5L19 7.5V19a2 2 0 0 1-2 2h-4.5' fill='none' stroke='white' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpolyline points='14 3 14 8 19 8' fill='none' stroke='white' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M10.42 12.61a2.1 2.1 0 1 1 2.97 2.97L7.95 21 4 22l.99-3.95 5.43-5.44Z' fill='none' stroke='white' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E";
            const manifest = {
                name: "S-Text Editor",
                short_name: "S-Text",
                start_url: ".",
                display: "standalone",
                theme_color: "#f1f3f4",
                background_color: "#ffffff",
                icons: [{ src: iconSvg, sizes: "192x192 512x512 any", type: "image/svg+xml", purpose: "any maskable" }]
            };
            const blob = new Blob([JSON.stringify(manifest)], {type: 'application/manifest+json'});
            const link = document.createElement('link');
            link.rel = 'manifest';
            link.href = URL.createObjectURL(blob);
            document.head.appendChild(link);
        })();
    </script>

    </footer>

    <!-- Message Toast -->
    <div id="toast" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-4 py-2 rounded-full shadow-lg opacity-0 transition-opacity duration-300 pointer-events-none z-50">
        Message
    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // --- App & Tab State ---
        let tabs = [];
        let activeTabId = null;
        let tabCounter = 0;
        let untitledCount = 0;
        let isDark = false;
        let isRestoringSession = false;

        // --- Session Persistence Logic ---
        let sessionSaveTimeout;
        function saveSession() {
            if (isRestoringSession) return;
            // Use a slight delay (debounce) so it doesn't try to save on every single millisecond of typing
            clearTimeout(sessionSaveTimeout);
            sessionSaveTimeout = setTimeout(() => {
                const sessionData = {
                    activeTabId,
                    tabCounter,
                    untitledCount,
                    tabs: tabs.map(t => ({
                        id: t.id,
                        name: t.name,
                        content: t.doc.getValue(),
                        isUnsaved: t.isUnsaved,
                        isRenamed: t.isRenamed
                    }))
                };
                localStorage.setItem('stext-session', JSON.stringify(sessionData));
            }, 500);
        }

        function restoreSession() {
            const dataStr = localStorage.getItem('stext-session');
            if (dataStr) {
                try {
                    isRestoringSession = true;
                    const data = JSON.parse(dataStr);
                    tabCounter = data.tabCounter || 0;
                    untitledCount = data.untitledCount || 0;
                    
                    if (data.tabs && data.tabs.length > 0) {
                        data.tabs.forEach(tData => {
                            const mode = getModeFromExtension(tData.name);
                            const doc = CodeMirror.Doc(tData.content, mode);
                            
                            // If the document wasn't unsaved when we closed the app, mark it clean
                            if (!tData.isUnsaved && !tData.isRenamed) {
                                doc.markClean();
                            }
                            
                            tabs.push({
                                id: tData.id,
                                name: tData.name,
                                handle: null, // OS File handles require re-authorization per session
                                doc: doc,
                                isUnsaved: tData.isUnsaved,
                                isRenamed: tData.isRenamed
                            });
                        });
                        
                        isRestoringSession = false;
                        const targetTabId = data.activeTabId && tabs.some(t => t.id === data.activeTabId) 
                            ? data.activeTabId 
                            : tabs[0].id;
                            
                        switchTab(targetTabId);
                        return; // Successfully restored
                    }
                } catch (e) {
                    console.error("Failed to restore session", e);
                } finally {
                    isRestoringSession = false;
                }
            }
            // Fallback if no session exists or parsing failed
            createTab();
        }

        // Initialize CodeMirror
        const editorTextArea = document.getElementById('editor');
        const editor = CodeMirror.fromTextArea(editorTextArea, {
            lineNumbers: true,
            mode: "null", 
            theme: "default",
            indentUnit: 4,
            matchBrackets: true,
            autoCloseBrackets: true,
            styleActiveLine: true
        });

        // DOM Elements
        const themeIcon = document.getElementById('theme-icon');
        const metaThemeColor = document.getElementById('meta-theme-color');
        const htmlElement = document.documentElement;

        // Editor Change Event
        editor.on('change', (cm, changeObj) => {
            // Only flag as unsaved if it's a real user edit, not a swapDoc event
            if (changeObj.origin !== 'setValue') {
                const tab = getActiveTab();
                if (tab) {
                    // Check if the current state matches the saved "clean" history state
                    const currentlyUnsaved = !tab.doc.isClean() || tab.isRenamed;
                    if (tab.isUnsaved !== currentlyUnsaved) {
                        tab.isUnsaved = currentlyUnsaved;
                        renderTabs();
                    }
                }
            }
            updateDocumentStats();
            updateMarkdownPreview();
            saveSession(); // Save the text content changes to memory
        });

        // Toast Notification Function
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.remove('opacity-0');
            setTimeout(() => {
                toast.classList.add('opacity-0');
            }, 3000);
        }

        // --- Tab Management Logic ---
        function getActiveTab() {
            return tabs.find(t => t.id === activeTabId);
        }

        function getModeFromExtension(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const modeMap = {
                'js': 'javascript', 'json': 'javascript',
                'html': 'htmlmixed', 'htm': 'htmlmixed',
                'css': 'css',
                'py': 'python',
                'md': 'markdown',
                'xml': 'xml', 'svg': 'xml',
                'c': 'clike', 'cpp': 'clike', 'java': 'clike', 'cs': 'clike'
            };
            return modeMap[ext] || "null";
        }

        function updatePreviewVisibility(mode) {
            const btnPreview = document.getElementById('btn-preview');
            if (mode === 'markdown') {
                btnPreview.classList.remove('hidden');
            } else {
                btnPreview.classList.add('hidden');
                if (typeof isPreviewActive !== 'undefined' && isPreviewActive) {
                    togglePreview();
                }
            }
        }

        function createTab(name = null, content = '', handle = null) {
            if (!name) {
                untitledCount++;
                name = untitledCount === 1 ? 'Untitled.txt' : `Untitled-${untitledCount}.txt`;
            }
            tabCounter++;
            const id = 'tab-' + tabCounter;
            const mode = getModeFromExtension(name);
            const doc = CodeMirror.Doc(content, mode);
            doc.markClean(); // Mark the starting state as clean
            
            const tab = { id, name, handle, doc, isUnsaved: false, isRenamed: false };
            tabs.push(tab);
            switchTab(id);
        }

        function switchTab(id) {
            activeTabId = id;
            const tab = getActiveTab();
            if (tab) {
                editor.swapDoc(tab.doc);
                const mode = getModeFromExtension(tab.name);
                updatePreviewVisibility(mode);
                updateCursorPosition();
                updateDocumentStats();
                updateMarkdownPreview();
                renderTabs();
            }
        }

        function closeTab(id) {
            const tabIndex = tabs.findIndex(t => t.id === id);
            const tab = tabs[tabIndex];
            
            if (tab.isUnsaved) {
                if (!confirm(`Save changes to "${tab.name}" before closing?\nClick OK to close and discard changes.`)) {
                    return;
                }
            }
            
            tabs.splice(tabIndex, 1);
            
            if (tabs.length === 0) {
                createTab(); // Always keep at least one tab open
            } else if (activeTabId === id) {
                const newActiveIndex = Math.max(0, tabIndex - 1);
                switchTab(tabs[newActiveIndex].id);
            } else {
                renderTabs();
            }
        }

        function renderTabs() {
            const tabBar = document.getElementById('tab-bar');
            tabBar.innerHTML = '';
            tabs.forEach(tab => {
                const isActive = tab.id === activeTabId;
                const tabEl = document.createElement('div');
                
                // Color formatting: Bright red if unsaved, otherwise standard blue/gray
                const colorClass = tab.isUnsaved ? 'text-red-500 font-bold' : (isActive ? 'text-blue-600 dark:text-blue-400 font-medium' : 'text-gray-600 dark:text-gray-400');
                const bgClass = isActive ? 'bg-white dark:bg-[#292a2d] border-b-2 border-b-blue-500' : 'bg-gray-100 dark:bg-[#202124] hover:bg-gray-200 dark:hover:bg-gray-700 border-b-2 border-transparent';
                
                tabEl.className = `group flex items-center px-4 py-2 border-r border-gray-300 dark:border-gray-700 cursor-pointer min-w-max select-none transition-colors ${bgClass}`;
                tabEl.onclick = () => switchTab(tab.id);

                const nameSpan = document.createElement('span');
                nameSpan.className = `text-sm mr-2 transition-colors ${colorClass}`;
                nameSpan.textContent = tab.name;
                nameSpan.title = "Double-click to rename";
                nameSpan.ondblclick = (e) => {
                    e.stopPropagation();
                    if(!isActive) switchTab(tab.id);
                    renameActiveTab();
                };

                const unsavedMark = document.createElement('span');
                unsavedMark.className = `text-lg leading-none mr-2 transition-colors ${tab.isUnsaved ? 'text-red-500' : 'opacity-0 w-0 mr-0 overflow-hidden'}`;
                unsavedMark.innerHTML = '&ast;';

                const closeBtn = document.createElement('button');
                closeBtn.className = `p-1 rounded flex items-center justify-center hover:bg-gray-300 dark:hover:bg-gray-600 text-gray-500 dark:text-gray-400 transition-colors opacity-0 group-hover:opacity-100 ${isActive ? 'opacity-100' : ''}`;
                closeBtn.innerHTML = '<i data-lucide="x" class="w-3 h-3"></i>';
                closeBtn.onclick = (e) => {
                    e.stopPropagation();
                    closeTab(tab.id);
                };

                tabEl.appendChild(nameSpan);
                tabEl.appendChild(unsavedMark);
                tabEl.appendChild(closeBtn);
                tabBar.appendChild(tabEl);
            });
            lucide.createIcons();
            
            // Any time the UI tabs change (open, close, rename), update memory
            saveSession();
        }

        function renameActiveTab() {
            const tab = getActiveTab();
            if(!tab) return;
            const newName = prompt("Enter new file name (including extension):", tab.name);
            if (newName && newName.trim() !== "" && newName !== tab.name) {
                if (confirm(`Are you sure you want to change the file name to "${newName}"?\n\nBecause of browser security, this will require you to choose a save location again the next time you save so the file can be created with the new name.`)) {
                    tab.name = newName.trim();
                    const mode = getModeFromExtension(tab.name);
                    editor.setOption("mode", mode);
                    updatePreviewVisibility(mode);
                    tab.handle = null;
                    tab.isRenamed = true; // Ensure it stays unsaved until properly saved
                    tab.isUnsaved = true;
                    renderTabs();
                    showToast(`File renamed to ${tab.name}`);
                }
            }
        }

        // --- Fallback Methods for iFrame / Canvas Environments ---
        function fallbackOpenFile() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.txt,.html,.css,.js,.json,.py,.md,.csv,.xml,.c,.cpp,.java';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const contents = event.target.result;
                    const currentTab = getActiveTab();
                    if (currentTab && currentTab.name.startsWith('Untitled') && !currentTab.isUnsaved && currentTab.doc.getValue() === '') {
                        currentTab.handle = null;
                        currentTab.name = file.name;
                        currentTab.doc = CodeMirror.Doc(contents, getModeFromExtension(file.name));
                        currentTab.doc.markClean(); // Set new clean baseline
                        currentTab.isRenamed = false;
                        editor.swapDoc(currentTab.doc);
                        updatePreviewVisibility(getModeFromExtension(file.name));
                        renderTabs();
                    } else {
                        createTab(file.name, contents, null);
                    }
                    showToast(`Opened ${file.name}`);
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function fallbackSaveFile(content, defaultFilename) {
            const filename = prompt("Enter file name to save:", defaultFilename);
            if (!filename) return; 

            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
            
            const tab = getActiveTab();
            if (tab) {
                tab.name = filename;
                tab.isUnsaved = false;
                tab.isRenamed = false;
                tab.doc.markClean(); // Set new clean baseline
                const mode = getModeFromExtension(filename);
                editor.setOption("mode", mode);
                updatePreviewVisibility(mode);
                renderTabs();
            }
            showToast("File downloaded (Fallback mode)");
        }

        // --- File System Actions ---
        async function newFile() {
            createTab();
            showToast("New tab created");
        }

        async function openFile() {
            try {
                const [handle] = await window.showOpenFilePicker({
                    types: [{
                        description: 'Text/Code Files',
                        accept: {'text/*': ['.txt', '.html', '.css', '.js', '.json', '.py', '.md', '.csv', '.xml', '.c', '.cpp', '.java']}
                    }],
                    excludeAcceptAllOption: false,
                });
                
                const file = await handle.getFile();
                const contents = await file.text();
                
                const currentTab = getActiveTab();
                // If opening a file while looking at an empty unsaved "Untitled" tab, overwrite it instead of opening a second tab
                if (currentTab && currentTab.name.startsWith('Untitled') && !currentTab.isUnsaved && currentTab.doc.getValue() === '') {
                    currentTab.handle = handle;
                    currentTab.name = file.name;
                    currentTab.doc = CodeMirror.Doc(contents, getModeFromExtension(file.name));
                    currentTab.doc.markClean(); // Set new clean baseline
                    currentTab.isRenamed = false;
                    editor.swapDoc(currentTab.doc);
                    updatePreviewVisibility(getModeFromExtension(file.name));
                    renderTabs();
                } else {
                    createTab(file.name, contents, handle);
                }
                showToast(`Opened ${file.name}`);
            } catch (err) {
                if (err.name === 'SecurityError' || err.message.includes('cross origin')) {
                    fallbackOpenFile();
                } else if (err.name !== 'AbortError') {
                    console.error(err);
                    showToast("Failed to open file");
                }
            }
        }

        async function saveFile() {
            const tab = getActiveTab();
            if (!tab) return;
            if (!tab.handle) {
                return saveFileAs();
            }
            try {
                const writable = await tab.handle.createWritable();
                await writable.write(tab.doc.getValue());
                await writable.close();
                
                tab.isUnsaved = false;
                tab.isRenamed = false;
                tab.doc.markClean(); // Set new clean baseline
                renderTabs();
                showToast("File saved!");
            } catch (err) {
                console.error(err);
                showToast("Failed to save file");
            }
        }

        async function saveFileAs() {
            const tab = getActiveTab();
            if (!tab) return;
            try {
                const handle = await window.showSaveFilePicker({
                    suggestedName: tab.name,
                    types: [{
                        description: 'Text/Code File',
                        accept: {'text/plain': ['.txt', '.html', '.css', '.js', '.json', '.py', '.md']}
                    }],
                });
                
                const writable = await handle.createWritable();
                await writable.write(tab.doc.getValue());
                await writable.close();
                
                const file = await handle.getFile();
                tab.handle = handle;
                tab.name = file.name;
                const mode = getModeFromExtension(file.name);
                editor.setOption("mode", mode);
                updatePreviewVisibility(mode);
                tab.isUnsaved = false;
                tab.isRenamed = false;
                tab.doc.markClean(); // Set new clean baseline
                renderTabs();
                showToast("File saved!");
            } catch (err) {
                if (err.name === 'SecurityError' || err.message.includes('cross origin')) {
                    fallbackSaveFile(tab.doc.getValue(), tab.name);
                } else if (err.name !== 'AbortError') {
                    console.error(err);
                    showToast("Failed to save file");
                }
            }
        }

        // Theme Toggle
        function toggleTheme() {
            isDark = !isDark;
            if (isDark) {
                htmlElement.classList.add('dark');
                editor.setOption("theme", "material-darker");
                themeIcon.setAttribute('data-lucide', 'sun');
                metaThemeColor.setAttribute('content', '#202124');
            } else {
                htmlElement.classList.remove('dark');
                editor.setOption("theme", "default");
                themeIcon.setAttribute('data-lucide', 'moon');
                metaThemeColor.setAttribute('content', '#f1f3f4');
            }
            lucide.createIcons();
        }

        // Word Wrap Toggle
        let isWordWrap = false;
        function toggleWordWrap() {
            isWordWrap = !isWordWrap;
            editor.setOption("lineWrapping", isWordWrap);
            const wrapIcon = document.getElementById('wrap-icon');
            if (isWordWrap) {
                wrapIcon.classList.add('text-blue-500');
            } else {
                wrapIcon.classList.remove('text-blue-500');
            }
            showToast(isWordWrap ? "Word Wrap: ON" : "Word Wrap: OFF");
        }

        // Event Listeners
        document.getElementById('btn-new').addEventListener('click', newFile);
        document.getElementById('btn-open').addEventListener('click', openFile);
        document.getElementById('btn-save').addEventListener('click', saveFile);
        document.getElementById('btn-saveas').addEventListener('click', saveFileAs);
        document.getElementById('btn-theme').addEventListener('click', toggleTheme);
        document.getElementById('btn-wrap').addEventListener('click', toggleWordWrap);
        document.getElementById('btn-search').addEventListener('click', () => {
            editor.execCommand('find');
        });
        
        // --- Feature 5: Zoom / Font Size Logic ---
        let currentFontSize = 15;
        const minFontSize = 8;
        const maxFontSize = 40;

        function updateFontSize() {
            const cmElement = document.querySelector('.CodeMirror');
            if (cmElement) {
                cmElement.style.fontSize = `${currentFontSize}px`;
                editor.refresh(); 
            }
            showToast(`Zoom: ${currentFontSize}px`);
        }

        function zoomIn() {
            if (currentFontSize < maxFontSize) {
                currentFontSize += 1;
                updateFontSize();
            }
        }

        function zoomOut() {
            if (currentFontSize > minFontSize) {
                currentFontSize -= 1;
                updateFontSize();
            }
        }

        function resetZoom() {
            currentFontSize = 15;
            updateFontSize();
        }

        document.getElementById('btn-zoomin').addEventListener('click', zoomIn);
        document.getElementById('btn-zoomout').addEventListener('click', zoomOut);

        // --- Feature 7: Markdown Preview Logic ---
        let isPreviewActive = false;
        const editorWrapper = document.getElementById('editor-wrapper');
        const markdownPreview = document.getElementById('markdown-preview');
        const previewIcon = document.getElementById('preview-icon');

        function togglePreview() {
            isPreviewActive = !isPreviewActive;
            if (isPreviewActive) {
                editorWrapper.classList.remove('w-full');
                editorWrapper.classList.add('w-1/2');
                markdownPreview.classList.remove('hidden');
                previewIcon.classList.add('text-blue-500');
                updateMarkdownPreview();
            } else {
                editorWrapper.classList.add('w-full');
                editorWrapper.classList.remove('w-1/2');
                markdownPreview.classList.add('hidden');
                previewIcon.classList.remove('text-blue-500');
            }
            setTimeout(() => editor.refresh(), 300);
            showToast(isPreviewActive ? "Preview: ON" : "Preview: OFF");
        }

        function updateMarkdownPreview() {
            if (isPreviewActive && typeof marked !== 'undefined') {
                markdownPreview.innerHTML = marked.parse(editor.getValue());
            }
        }

        document.getElementById('btn-preview').addEventListener('click', togglePreview);

        // Dropdown Actions
        document.getElementById('btn-info').addEventListener('click', () => {
            const tab = getActiveTab();
            if(!tab) return;
            alert(`File Name: ${tab.name}\n\nNote: Modern web browsers strictly prevent web applications from seeing your full computer folder path for privacy and security reasons. Your file is saved in the location you selected in your device's file manager.`);
        });
        document.getElementById('btn-rename').addEventListener('click', renameActiveTab);

        // Keyboard Shortcuts
        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey || e.metaKey) {
                switch (e.key.toLowerCase()) {
                    case 's':
                        e.preventDefault();
                        if (e.shiftKey) saveFileAs();
                        else saveFile();
                        break;
                    case 'o':
                        e.preventDefault();
                        openFile();
                        break;
                    case 'm':
                        e.preventDefault();
                        newFile();
                        break;
                    case '=': 
                    case '+':
                        e.preventDefault();
                        zoomIn();
                        break;
                    case '-':
                        e.preventDefault();
                        zoomOut();
                        break;
                    case '0':
                        e.preventDefault();
                        resetZoom();
                        break;
                }
            } else if (e.altKey && e.key.toLowerCase() === 'z') {
                e.preventDefault();
                toggleWordWrap();
            } else if (e.altKey && e.key.toLowerCase() === 'p') {
                e.preventDefault();
                const btnPreview = document.getElementById('btn-preview');
                if (!btnPreview.classList.contains('hidden')) {
                    togglePreview();
                }
            }
        });

        // Initialize user preference for theme
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            toggleTheme();
        }

        // --- Feature 1: Drag & Drop File Opening ---
        document.body.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.stopPropagation();
            e.dataTransfer.dropEffect = 'copy';
            document.body.classList.add('opacity-75', 'transition-opacity');
        });

        document.body.addEventListener('dragleave', (e) => {
            e.preventDefault();
            e.stopPropagation();
            document.body.classList.remove('opacity-75', 'transition-opacity');
        });

        document.body.addEventListener('drop', async (e) => {
            e.preventDefault();
            e.stopPropagation();
            document.body.classList.remove('opacity-75', 'transition-opacity');

            if (e.dataTransfer.items && e.dataTransfer.items.length > 0) {
                const item = e.dataTransfer.items[0];
                if (item.kind === 'file') {
                    try {
                        const file = item.getAsFile();
                        if (!file) return;

                        let handle = null;
                        if ('getAsFileSystemHandle' in item) {
                            const tempHandle = await item.getAsFileSystemHandle();
                            if (tempHandle && tempHandle.kind === 'file') {
                                handle = tempHandle;
                            }
                        }

                        const contents = await file.text();
                        
                        const currentTab = getActiveTab();
                        if (currentTab && currentTab.name.startsWith('Untitled') && !currentTab.isUnsaved && currentTab.doc.getValue() === '') {
                            currentTab.handle = handle;
                            currentTab.name = file.name;
                            currentTab.doc = CodeMirror.Doc(contents, getModeFromExtension(file.name));
                            currentTab.doc.markClean(); // Set new clean baseline
                            currentTab.isRenamed = false;
                            editor.swapDoc(currentTab.doc);
                            updatePreviewVisibility(getModeFromExtension(file.name));
                            renderTabs();
                        } else {
                            createTab(file.name, contents, handle);
                        }
                        showToast(`Opened ${file.name}`);
                    } catch (err) {
                        console.error("Error opening dropped file:", err);
                        showToast("Failed to open dropped file");
                    }
                }
            }
        });

        // --- Feature 2: Status Bar Logic ---
        const cursorPositionEl = document.getElementById('cursor-position');
        const documentStatsEl = document.getElementById('document-stats');

        function updateCursorPosition() {
            const pos = editor.getCursor();
            cursorPositionEl.textContent = `Ln ${pos.line + 1}, Col ${pos.ch + 1}`;
        }

        function updateDocumentStats() {
            const text = editor.getValue();
            const chars = text.length;
            const words = text.trim() ? text.trim().split(/\s+/).length : 0;
            documentStatsEl.textContent = `Words: ${words} | Chars: ${chars}`;
        }

        editor.on('cursorActivity', updateCursorPosition);
        
        // --- Unsaved Changes Warning on Close ---
        window.addEventListener('beforeunload', (e) => {
            if (tabs.some(t => t.isUnsaved)) {
                e.preventDefault();
                e.returnValue = ''; 
            }
        });
        
        // --- Dropdown Menu Logic ---
        const menuToggle = document.getElementById('btn-menu-toggle');
        const dropdownMenu = document.getElementById('dropdown-menu');
        
        menuToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            dropdownMenu.classList.toggle('hidden');
        });

        document.addEventListener('click', (e) => {
            if (!dropdownMenu.contains(e.target) && !menuToggle.contains(e.target)) {
                dropdownMenu.classList.add('hidden');
            }
        });

        dropdownMenu.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', () => {
                dropdownMenu.classList.add('hidden');
            });
        });

        // Initialize First Tab or Restore Session
        restoreSession();
        
    </script>
</body>
</html>
